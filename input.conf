# Kubernetes Multi-Cluster Configuration File (input.conf)
# =============================================================================
# Unified configuration: credentials, supervisor mappings, and cluster names
# Lines starting with # are comments and will be ignored
# Empty lines are ignored
#
# Environment: VMware Cloud Foundation 5.2.1, VKS 3.3.3, VKR 1.28.x/1.29.x
# =============================================================================
#
# Sections:
#   [credentials]   - vSphere credentials (optional, env vars take priority)
#   [supervisors]   - Supervisor cluster IP/FQDN mappings for vSphere login
#   Cluster names   - One per line after the sections above
#
# Credential Priority (highest → lowest):
#   1. Environment variables (supports CI/CD automation)
#   2. Credentials section in this file
#   3. Interactive prompt (fallback)
#
# Cluster Naming Patterns:
#   *-prod-[1-4]     → Production supervisor mapping
#   *-uat-[1-4]      → Non-Production supervisor mapping
#   *-system-[1-4]   → Non-Production supervisor mapping
#
# =============================================================================

# =============================================================================
# Credentials (optional - environment variables take priority over these)
# Format: KEY=value (between ===CREDENTIALS=== markers)
# AO_ACCOUNT_* is used for all Supervisor logins and for prod workload logins
# NONAO_ACCOUNT_* is used only for non-prod workload logins
# =============================================================================
# ===CREDENTIALS===
# AO_ACCOUNT_USERNAME=supervisor-and-prod-username
# AO_ACCOUNT_PASSWORD=supervisor-and-prod-password
# NONAO_ACCOUNT_USERNAME=nonprod-workload-username
# NONAO_ACCOUNT_PASSWORD=nonprod-workload-password
# ===END_CREDENTIALS===

# =============================================================================
# Supervisor Cluster IP/FQDN Mapping
# Used by vSphere login to map cluster suffixes to Supervisor endpoints
# Format: suffix=ip-or-fqdn (between ===SUPERVISORS=== markers)
# =============================================================================
# ===SUPERVISORS===
prod-1=supvr-w11c1-prod-1.k8s.ntrs.com
prod-2=supvr-w11c1-prod-2.k8s.ntrs.com
prod-3=supvr-w11c2-prod-3.k8s.ntrs.com
prod-4=supvr-w11c2-prod-4.k8s.ntrs.com
system-1=supvr-w10c1-system-1.k8s.ntrs.com
system-3=supvr-w10c2-system-3.k8s.ntrs.com
uat-2=supvr-w10c1-uat-2.k8s.ntrs.com
uat-4=supvr-w10c2-uat-4.k8s.ntrs.com
# ===END_SUPERVISORS===

# Production Clusters (naming pattern: *-prod-[1-4])
svcs-k8s-1-prod-1

