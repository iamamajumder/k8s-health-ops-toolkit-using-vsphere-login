# Kubernetes Multi-Cluster Health Check Configuration File v3.1
# =============================================================================
# Format: Simple cluster names (one per line)
# Lines starting with # are comments and will be ignored
# Empty lines are ignored
#
# Environment: VMware Cloud Foundation 5.2.1, VKS 3.3.3, VKR 1.28.x/1.29.x
# =============================================================================
#
# New in v3.1:
# - Simplified format: Just cluster names (no management-cluster.provisioner)
# - Auto-discovery: Management cluster and provisioner fetched from TMC
# - Auto-context: TMC contexts created automatically based on naming patterns
#
# Cluster Naming Patterns:
#   *-prod-[1-4]     → Production TMC context
#   *-uat-[1-4]      → Non-production TMC context
#   *-system-[1-4]   → Non-production TMC context
#
# Environment Variables (optional):
#   TMC_SELF_MANAGED_USERNAME    TMC username (will prompt if not set)
#   TMC_SELF_MANAGED_PASSWORD    TMC password (will prompt if not set)
#   WINDOWS_SCP_ENABLED          Set to 'true' to enable Windows SCP
#   WINDOWS_SCP_USER             Windows username for SCP
#   WINDOWS_SCP_HOST             Windows hostname for SCP
#   WINDOWS_PRE_PATH             Windows path for PRE reports
#   WINDOWS_POST_PATH            Windows path for POST reports
#
# =============================================================================

